name: Update Market Status

on:
  workflow_dispatch:
  schedule:
    # 8:00 AM CDMX aprox = 14:00 UTC (CDMX suele ser UTC-6)
    - cron: "5 14 * * 1-5"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build status.json
        run: |
          python scripts/build_status.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/status.json
          git diff --cached --quiet || git commit -m "Update market status"
          git push
